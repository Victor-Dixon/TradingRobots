name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enforce Python LOC limit (< 400)
        run: |
          python - <<'PY'
          from pathlib import Path
          violations = []
          for py_file in Path(".").rglob("*.py"):
            line_count = sum(1 for _ in py_file.open("r", encoding="utf-8"))
            if line_count >= 400:
              violations.append((str(py_file), line_count))
          if violations:
            for path, count in violations:
              print(f"LOC violation: {path} has {count} lines (must be < 400)")
            raise SystemExit(1)
          print("All Python files are under 400 LOC.")
          PY

      - name: Run phased test gate
        run: ./ci/run_tests.sh
